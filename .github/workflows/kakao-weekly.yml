name: Weekly Kakao GIS Refresh

on:
  schedule:
    # 매주 일요일 22:00 UTC = 월요일 07:00 KST
    - cron: '0 22 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  kakao:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug Kakao secret wiring (presence only)
        run: |
          python - <<'PY'
          import os
          keys = [
              "KAKAO_REST_API_KEY", "KAKAO_REST_API", "KAKAO_REST_KEY", "KAKAO_API_KEY",
              "KAKAO_JS_KEY", "KAKAO_JAVASCRIPT_KEY", "KAKAO_MAP_JS_KEY",
          ]
          print("--- explicit candidates ---")
          for k in keys:
              v = os.environ.get(k, "")
              state = f"set(len={len(v.strip())})" if v.strip() else "empty"
              print(f"{k}={state}")
          print("--- all KAKAO_* env vars in this job ---")
          any_kakao = False
          for k, v in sorted(os.environ.items()):
              if not k.upper().startswith("KAKAO"):
                  continue
              any_kakao = True
              s = (v or "").strip()
              print(f"{k}={'set(len=%d)' % len(s) if s else 'empty'}")
          if not any_kakao:
              print("(no KAKAO_* env vars wired into this job — secret was likely added under a different scope)")
          PY
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REST_API: ${{ secrets.KAKAO_REST_API }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          KAKAO_JAVASCRIPT_KEY: ${{ secrets.KAKAO_JAVASCRIPT_KEY }}
          KAKAO_MAP_JS_KEY: ${{ secrets.KAKAO_MAP_JS_KEY }}

      - name: Fetch Kakao bank branches (GIS)
        run: python -u scripts/fetch_kakao_branches.py
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REST_API: ${{ secrets.KAKAO_REST_API }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          KAKAO_JAVASCRIPT_KEY: ${{ secrets.KAKAO_JAVASCRIPT_KEY }}
          KAKAO_MAP_JS_KEY: ${{ secrets.KAKAO_MAP_JS_KEY }}

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kakao_branches.json data/kakao_config.json
          if git diff --cached --quiet; then
            echo "No GIS changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly kakao GIS refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            if git push; then
              echo "Push ok on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, rebasing onto origin/main…"
            git fetch origin main
            git pull --rebase origin main || true
          done
          echo "Push ultimately failed after 3 attempts" >&2
          exit 1
