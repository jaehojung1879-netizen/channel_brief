name: Daily Channel Brief Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news (RSS)
        run: python scripts/fetch_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Fetch development + stats
        run: python scripts/fetch_dev_and_stats.py
        env:
          FISIS_API_KEY: ${{ secrets.FISIS_API_KEY }}
          FISIS_BRANCH_API_URL: ${{ secrets.FISIS_BRANCH_API_URL }}
          FISIS_FINANCE_CD: ${{ secrets.FISIS_FINANCE_CD }}
          FISIS_LIST_NO: ${{ secrets.FISIS_LIST_NO }}
          FISIS_LIST_NO_BRANCH: ${{ secrets.FISIS_LIST_NO_BRANCH }}
          FISIS_LIST_NO_REGIONAL: ${{ secrets.FISIS_LIST_NO_REGIONAL }}
          FISIS_ACCOUNT_CD: ${{ secrets.FISIS_ACCOUNT_CD }}
          FISIS_TERM: ${{ secrets.FISIS_TERM }}
          FISIS_START_BASE_MM: ${{ secrets.FISIS_START_BASE_MM }}
          FISIS_END_BASE_MM: ${{ secrets.FISIS_END_BASE_MM }}
        continue-on-error: true

      - name: Fetch issues + global
        run: python scripts/fetch_issues_global.py
        continue-on-error: true

      - name: Generate build timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_build.txt
          echo "Build: $(date -u)"

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # race condition 대비: push 실패 시 rebase 후 최대 3회 재시도
          for attempt in 1 2 3; do
            if git push; then
              echo "Push ok on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, rebasing onto origin/main…"
            git fetch origin main
            git pull --rebase origin main || true
          done
          echo "Push ultimately failed after 3 attempts" >&2
          exit 1
