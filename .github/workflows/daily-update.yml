name: Daily Channel Brief Update

on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news (RSS)
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Fetch disclosures (KFB / FSC)
        run: python scripts/fetch_disclosure.py
        continue-on-error: true

      - name: Fetch development + stats
        run: python scripts/fetch_dev_and_stats.py
        env:
          FISIS_API_KEY: ${{ secrets.FISIS_API_KEY }}
          FISIS_BRANCH_API_URL: ${{ secrets.FISIS_BRANCH_API_URL }}
          FISIS_FINANCE_CD: ${{ secrets.FISIS_FINANCE_CD }}
          FISIS_PART_DIV: ${{ secrets.FISIS_PART_DIV }}
          FISIS_LRG_DIV: ${{ secrets.FISIS_LRG_DIV }}
          FISIS_SML_DIV: ${{ secrets.FISIS_SML_DIV }}
          FISIS_LIST_NO: ${{ secrets.FISIS_LIST_NO }}
          FISIS_ACCOUNT_CD: ${{ secrets.FISIS_ACCOUNT_CD }}
          FISIS_TERM: ${{ secrets.FISIS_TERM }}
          FISIS_START_BASE_MM: ${{ secrets.FISIS_START_BASE_MM }}
          FISIS_END_BASE_MM: ${{ secrets.FISIS_END_BASE_MM }}
          BRANCH_STATS_API_KEY: ${{ secrets.BRANCH_STATS_API_KEY }}
          BRANCH_STATS_API_URL: ${{ secrets.BRANCH_STATS_API_URL }}
          BRANCH_STATS_FINANCE_CD: ${{ secrets.BRANCH_STATS_FINANCE_CD }}
          BRANCH_STATS_PART_DIV: ${{ secrets.BRANCH_STATS_PART_DIV }}
          BRANCH_STATS_LRG_DIV: ${{ secrets.BRANCH_STATS_LRG_DIV }}
          BRANCH_STATS_SML_DIV: ${{ secrets.BRANCH_STATS_SML_DIV }}
          BRANCH_STATS_LIST_NO: ${{ secrets.BRANCH_STATS_LIST_NO }}
          BRANCH_STATS_ACCOUNT_CD: ${{ secrets.BRANCH_STATS_ACCOUNT_CD }}
          BRANCH_STATS_TERM: ${{ secrets.BRANCH_STATS_TERM }}
          BRANCH_STATS_START_BASE_MM: ${{ secrets.BRANCH_STATS_START_BASE_MM }}
          BRANCH_STATS_END_BASE_MM: ${{ secrets.BRANCH_STATS_END_BASE_MM }}
        continue-on-error: true

      - name: Fetch issues + global
        run: python scripts/fetch_issues_global.py
        continue-on-error: true

      - name: Generate build timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_build.txt
          echo "Build: $(date -u)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
