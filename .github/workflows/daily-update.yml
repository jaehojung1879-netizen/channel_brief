name: Daily Channel Brief Update

on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news (RSS)
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Fetch disclosures (KFB / FSC)
        run: python scripts/fetch_disclosure.py
        continue-on-error: true

      - name: Fetch development + stats
        run: python scripts/fetch_dev_and_stats.py
        continue-on-error: true

      - name: Fetch issues + global
        run: python scripts/fetch_issues_global.py
        continue-on-error: true

      - name: Generate build timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_build.txt
          echo "Build: $(date -u)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
