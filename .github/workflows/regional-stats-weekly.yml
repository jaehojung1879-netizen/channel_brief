name: Weekly Regional Stats Refresh

on:
  schedule:
    # 매주 일요일 23:00 UTC = 월요일 08:00 KST
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regional-stats-update
  cancel-in-progress: false

jobs:
  regional-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch regional stats (KOSIS · R-ONE)
        run: python -u scripts/fetch_regional_stats.py
        env:
          KOSIS: ${{ secrets.KOSIS }}
          R_ONE: ${{ secrets.R_ONE }}

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regional_stats.json
          if git diff --cached --quiet; then
            echo "No regional stats changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly regional stats refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            if git push; then
              echo "Push ok on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, rebasing onto origin/main…"
            git fetch origin main
            git pull --rebase origin main || true
          done
          echo "Push ultimately failed after 3 attempts" >&2
          exit 1
